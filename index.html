<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fake News Generator</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

  <header class="main-header">
    <div class="logo">
      <a href="/">Fake News Generator</a>
    </div>
    <button class="menu-toggle" aria-label="Toggle menu">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
    <nav class="nav-links">
      <a href="/" class="nav-link active">Home</a>
    </nav>
  </header>

  <div class="news-generator">
    <div class="input-section">
      <h1>Fake News Generator</h1>
      <label for="channelName">Channel Name</label>
      <input type="text" id="channelName" placeholder="CNN" oninput="updatePreview()">

      <label for="headline">Headline</label>
      <input type="text" id="headline" placeholder="Flying Shoes Hit the Market" oninput="updatePreview()">

      <label for="description">Description</label>
      <input type="text" id="description" placeholder="Flying shoes allow people to avoid traffic by gliding smoothly above..." oninput="updatePreview()">

      <label for="imageUpload">Upload an Image</label>
      <input type="file" id="imageUpload" accept="image/*" onchange="previewImage(event)">

      <label for="dateInput">Enter Date and Time</label>
      <input type="datetime-local" id="dateInput" oninput="updatePreview()">
      <button class="reset-button" onclick="resetFields()">Reset</button>
    </div>

    <div class="output-section">
      <div class="output-image-container" id="preview">
        <div class="live-banner">LIVE</div>
        <div class="branding">fakenewsgenerator.org</div>
        <img id="previewImage" class="draggable-image" style="display: none;" alt="Uploaded Image Preview">
        <div class="breaking-news">BREAKING NEWS</div>
        <div class="channel-name-headline">
          <div class="channel-name" id="previewChannelName">CNN</div>
          <div class="headline-text" id="previewHeadline">Flying Shoes Hit the Market</div>
        </div>
        <div class="description-container">
          <div class="time-date" id="timeDate">
            <div id="time">12:00 PM</div>
            <div id="date">01/01/2024</div>
          </div>
          <div class="description-text" id="previewDescription">Flying shoes allow people to avoid traffic by gliding smoothly above...</div>
        </div>
      </div>

      <div class="download-button-container">
        <button class="download-button" id="downloadButton" onclick="downloadImage()"><i class="fas fa-download"></i> Download</button>
      </div>
    </div>
  </div>
  </div>
  <footer>
    <p>Fake News Generator powered by <a href="https://fakenewsgenerator.org" target="_blank">Fake News Generator</a>.</p>
  </footer>
  <script>

  </script>
</body>

</html>
